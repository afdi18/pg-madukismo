services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
      target: app
    image: pg-madukismo-app:latest
    container_name: pg-madukismo-app
    restart: unless-stopped
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      APP_ENV: local
      APP_DEBUG: "true"
      APP_URL: http://localhost:8000
      VITE_APP_URL: http://localhost:8000
      VITE_DEV_SERVER_URL: ""
