services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
      target: app
    image: ${APP_IMAGE:-pg-madukismo-app:latest}
    restart: unless-stopped
    ports:
      - "${APP_PORT:-8000}:8000"
    environment:
      APP_NAME: ${APP_NAME:-Dashboard Monitoring PG Madukismo}
      APP_ENV: ${APP_ENV:-production}
      APP_DEBUG: ${APP_DEBUG:-false}
      APP_URL: ${APP_URL:-http://localhost:8000}
      APP_KEY: ${APP_KEY}
      LOG_CHANNEL: ${LOG_CHANNEL:-stack}
      LOG_LEVEL: ${LOG_LEVEL:-info}

      DB_CONNECTION: ${DB_CONNECTION:-pgsql}
      DB_PGSQL_HOST: ${DB_PGSQL_HOST}
      DB_PGSQL_PORT: ${DB_PGSQL_PORT:-5432}
      DB_PGSQL_DATABASE: ${DB_PGSQL_DATABASE}
      DB_PGSQL_USERNAME: ${DB_PGSQL_USERNAME}
      DB_PGSQL_PASSWORD: ${DB_PGSQL_PASSWORD}

      DB_SQLSRV_HOST: ${DB_SQLSRV_HOST}
      DB_SQLSRV_PORT: ${DB_SQLSRV_PORT:-1433}
      DB_SQLSRV_DATABASE: ${DB_SQLSRV_DATABASE}
      DB_SQLSRV_USERNAME: ${DB_SQLSRV_USERNAME}
      DB_SQLSRV_PASSWORD: ${DB_SQLSRV_PASSWORD}
      DB_SQLSRV_ENCRYPT: ${DB_SQLSRV_ENCRYPT:-yes}
      DB_SQLSRV_TRUST_CERT: ${DB_SQLSRV_TRUST_CERT:-false}

      VITE_APP_URL: ${VITE_APP_URL:-http://localhost:8000}
      VITE_DEV_SERVER_URL: ${VITE_DEV_SERVER_URL:-}
    networks:
      LAN50:
        ipv4_address: 172.16.10.23

networks:
  LAN50:
    external: true	    
